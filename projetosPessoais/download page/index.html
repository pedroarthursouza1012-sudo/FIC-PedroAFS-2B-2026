<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Download-page</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="pop-up-box" id="pop_up">
        <p id="pop_up_p"></p>
    </div>


<div id="main">

    <button class="button">
   <img src="img/download.png" alt="download">
   <span>Download</span>
    </button>

    <div class="barra">

        <div class="progresso"><p id="porcentagem">0%</p></div>

    </div>




    <div class="btn-box">

    <button id="pause" class="btn">

        <img src="img/circle-pause-solid.png" alt="pause">

    </button>

    <button id="return" class="btn">

        <img src="img/circle-arrow-right-solid.png" alt="return">

    </button>

    </div>




    
</div>


    <div class="instalando">
        <h2 id="h2-install">Instalando</h2>
        <div class="spinner"></div>
        <img src="img/check-solid.png" alt="check" id="img-check">
    </div>

    <img src="img/minecraft-title-screen.jpg" alt="" id="mine">
    <button id="refresh"><img src="img/arrow-rotate-right-solid.png" alt="refresh">
    </button>
   <script src="script.js"></script>
</body>
</html>
